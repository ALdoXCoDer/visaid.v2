<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Negara</title>

<style>
body{font-family:Poppins;background:#f5f5f5;margin:0}

h1{text-align:center;padding:30px}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
padding:40px;
}

.card{
border-radius:20px;
overflow:hidden;
background:white;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
transition:0.5s;
}

.card:hover img{
transform:scale(1.1);
}

.content{
padding:15px;
}

a{
display:inline-block;
margin-top:10px;
background:black;
color:white;
padding:10px 15px;
text-decoration:none;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Pilih Negara 🌍</h1>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1494526585095-c41746248156">
<div class="content">
<h2>Amerika Serikat</h2>
<a href="paket.html?negara=Amerika">Booking</a>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e">
<div class="content">
<h2>Jepang</h2>
<a href="paket.html?negara=Jepang">Booking</a>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1505761671935-60b3a7427bad">
<div class="content">
<h2>Korea Selatan</h2>
<a href="paket.html?negara=Korea">Booking</a>
</div>
</div>

</div>

</body>
</html>

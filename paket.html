<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Paket</title>

<style>
body{font-family:Poppins;background:#f5f5f5;margin:0}

/* TITLE */
h1{text-align:center;padding:30px}

/* CARD */
.card{
background:white;
padding:25px;
margin:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* BUTTON */
button{
padding:12px;
background:black;
color:white;
border:none;
border-radius:10px;
width:100%;
}

/* POPUP */
.popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:25px;
border-radius:15px;
width:320px;
animation:fade 0.3s;
}

@keyframes fade{
from{transform:scale(0.8);opacity:0}
to{transform:scale(1);opacity:1}
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<h1 id="judul"></h1>

<div class="card">
<h2>Paket Reguler</h2>
<p>✔ Konsultasi</p>
<p>✔ Pengurusan Dokumen</p>
<p>✔ Bantuan Interview</p>
<p><b>Rp 3.500.000</b></p>
<button onclick="openPopup('Reguler')">Pilih Paket</button>
</div>

<div class="card">
<h2>Paket Express</h2>
<p>✔ Semua fitur reguler</p>
<p>✔ Prioritas Proses</p>
<p><b>Rp 6.000.000</b></p>
<button onclick="openPopup('Express')">Pilih Paket</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="box">

<h3>Isi Data Anda</h3>

<input id="nama" placeholder="Nama Lengkap">
<input id="hp" placeholder="Nomor WhatsApp">

<button onclick="kirim()">Lanjut ke WhatsApp</button>

</div>
</div>

<script>

/* AMBIL NEGARA */
let params = new URLSearchParams(location.search)
let negara = params.get("negara")

document.getElementById("judul").innerText =
"Visa " + negara

let paket = ""

/* POPUP */
function openPopup(p){
paket = p
document.getElementById("popup").style.display="flex"
}

/* KIRIM */
function kirim(){

let nama = document.getElementById("nama").value
let hp = document.getElementById("hp").value

let text =
`Halo Visa ID
Nama: ${nama}
No HP: ${hp}
Negara: ${negara}
Paket: ${paket}`

window.open("https://wa.me/628816906696?text="+encodeURIComponent(text))

}

</script>

</body>
</html>
